    <h1>Create a Task</h1>
    <form action="" method="get" class="create-task">
        <div class="create-task">
          <label for="task">Enter your task: </label>
          <input type="text" name="task" id="task" required />
        </div>
        <div class="create-task">
          <label for="category">Enter the task category: </label>
          <input type="category" name="category" id="category" required />
        </div>
        <div class="create-task">
          <input type="submit" value="Create Task" />
        </div>
      </form>
